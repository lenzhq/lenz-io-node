name: Release

# Publishes lenz-io to npm via OIDC trusted publisher (or fallback NPM_TOKEN).
# Trigger: push a tag like `v1.0.0-rc.1` (or `v1.0.0`, etc.).
# Required npm setup: Trusted Publishers on the lenz-io package settings page.
#   Org: lenzhq, Repo: lenz-io-node, Workflow: release.yml, Env: npm

on:
  push:
    tags:
      - "v*"

jobs:
  smoke:
    name: staging smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Run smoke tests against staging
        env:
          LENZ_E2E_KEY: ${{ secrets.LENZ_E2E_KEY }}
          LENZ_BASE_URL: ${{ vars.LENZ_BASE_URL }}
        run: npm run test:smoke || true # opt-in; if no key, pass

  publish:
    name: publish to npm
    needs: smoke
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/lenz-io
    permissions:
      id-token: write # OIDC trusted publisher
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm >= 11, which is required for OIDC
          # trusted-publisher token negotiation. Node 22 ships npm 10.x and
          # falls back to NPM_TOKEN (empty here -> ENEEDAUTH). In-place
          # upgrade via `npm install -g npm@latest` is broken on hosted
          # runners (MODULE_NOT_FOUND: promise-retry).
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      # Source the version from the git tag (`v1.2.3-rc.4` → `1.2.3-rc.4`)
      # so package.json never has to be hand-bumped. --no-git-tag-version
      # keeps it as a working-tree edit — we don't commit the bump.
      - run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"
      - run: npm run build
      - name: Publish (OIDC if configured, else NPM_TOKEN)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # npm 11 requires an explicit dist-tag for prerelease versions so they
        # don't silently overwrite `latest`. Tags containing `-` (e.g. -rc.6)
        # publish under `next`; clean semver tags promote to `latest`.
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            npm publish --access public --provenance --tag next
          else
            npm publish --access public --provenance
          fi
